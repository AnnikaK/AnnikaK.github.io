<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learnly | Reading Exercises</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        h1 { color: #2c3e50; font-size: 2.5rem; margin-bottom: 30px; }
        h2 { color: #7f8c8d; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        #start-interface { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #button-list { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }

        /* BASE BUTTON STYLE */
        .reading-btn {
            color: white; border: none; padding: 18px 45px;
            font-size: 1.3rem; font-weight: bold; border-radius: 12px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px;
        }

        /* UNIT 1 BLUE STYLE */
        .u1-btn { background: #3498db !important; }
        .u1-btn:hover { background: #2980b9 !important; transform: translateY(-3px); }

        /* UNIT 2 RED STYLE (MATCHING EXERCISES) */
        .u2-btn { background: #e74c3c !important; }
        .u2-btn:hover { background: #c0392b !important; transform: translateY(-3px); }

        #content-container { display: none; background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 800px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #reading-text { font-size: 1.1rem; color: #444; text-align: justify; line-height: 1.8; margin-bottom: 30px; }
        .text-title { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }

        .opt-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .opt-btn.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        .question-btn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .back-link { margin-top: 50px; display: inline-block; color: #3498db; text-decoration: none; font-weight: bold; }
        .progress { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1 id="main-title">Reading</h1>

    <div id="start-interface">
        <h2 id="unit-display-title">Loading...</h2>
        <div id="button-list"></div>
    </div>

    <div id="content-container">
        <div id="reading-section">
            <h2 class="text-title"></h2>
            <div id="reading-text"></div>
            <button class="question-btn" onclick="startQuiz()">Go to Questions</button>
        </div>

        <div id="quiz-section" style="display:none;">
            <div class="progress">Question <span id="q-num">1</span> of 10</div>
            <div id="quiz-content"></div>
            <div id="result-screen" style="display:none; text-align:center;">
                <h2>Quiz Finished!</h2>
                <p id="final-score" style="font-size:1.5rem; color: #2ecc71; font-weight: bold;"></p>
                <button class="opt-btn" style="text-align:center; background:#3498db; color:white;" onclick="location.reload()">Restart Exercise</button>
            </div>
        </div>
    </div>

    <a href="reading-hub.html" class="back-link">← Back to Units</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const selectedUnit = urlParams.get('unit') || 1;
        let currentQ = 0; let score = 0; let activeData = null;

        const allData = {
            1: {
                1: { title: "The Rise of AI", text: "<p>Artificial Intelligence is no longer sci-fi...</p>", questions: [{q:"What is AI?", a:["Art","AI","App"], c:"AI"}] },
                2: { title: "Nvidia: AI Engine", text: "<p>Nvidia transformed from gaming to AI...</p>", questions: [{q:"Founded?", a:["1990","1993"], c:"1993"}] }
            },
            2: {
                1: {
                    title: "The Curse of the Black Raven",
                    text: `<p>The salty mist of the Caribbean Sea stung Captain Silas’s eyes as he stood on the deck of the <i>Black Raven</i>. For fifteen years, he had searched for the legendary Isle of Echoes, a place said to hold a treasure that could grant a sailor eternal life. His crew whispered about a curse: any man who set foot on the isle would never hear another sound except the echo of his own heartbeat.</p>
                           <p>As the moon rose, a jagged silhouette appeared on the horizon. Silas felt a cold shiver. They were being pulled in by a current that didn't exist on any map. As the ship scraped against the white sands, the crew went silent. The gulls and the ocean sounds vanished. The price of the treasure was far heavier than any of them had imagined.</p>`,
                    questions: [
                        { q: "What is the ship's name?", a: ["Black Raven", "Sea Hawk", "Echo Queen"], c: "Black Raven" },
                        { q: "Where does it take place?", a: ["Caribbean Sea", "North Sea", "Atlantic"], c: "Caribbean Sea" },
                        { q: "How long was the search?", a: ["5 years", "15 years", "20 years"], c: "15 years" },
                        { q: "The treasure grants...", a: ["Gold", "Eternal life", "Speed"], c: "Eternal life" },
                        { q: "The curse affects your...", a: ["Eyes", "Hearing", "Hands"], c: "Hearing" },
                        { q: "The sand was...", a: ["Black", "White", "Red"], c: "White" },
                        { q: "The island glowed...", a: ["Green", "Blue", "Yellow"], c: "Green" },
                        { q: "What vanished first?", a: ["The wind", "The crew", "The island"], c: "The wind" },
                        { q: "Captain's name?", a: ["Silas", "Jack", "Peter"], c: "Silas" },
                        { q: "The island was...", a: ["A legend", "A map", "A cloud"], c: "A legend" },
                        { q: "Crew origin?", a: ["Spain", "Every corner of globe", "Local"], c: "Every corner of globe" },
                        { q: "Ship material?", a: ["Iron", "Mahogany", "Plastic"], c: "Mahogany" },
                        { q: "Silas felt a...", a: ["Warmth", "Shiver", "Pain"], c: "Shiver" },
                        { q: "The current was...",  a: ["Weak", "Not on any map", "Fast"], c: "Not on any map" },
                        { q: "Silence meant...", a: ["Peace", "The curse", "Sleep"], c: "The curse" },
                        { q: "Lookout's spot?", a: ["Deck", "Crow's nest", "Cabin"], c: "Crow's nest" },
                        { q: "Island feature?", a: ["Forest", "Lagoon", "City"], c: "Lagoon" },
                        { q: "Silas's eyes were...", a: ["Closed", "Stung by mist", "Blue"], c: "Stung by mist" },
                        { q: "The silhouette was...", a: ["Round", "Jagged", "Small"], c: "Jagged" },
                        { q: "The price was...", a: ["Cheap", "Heavier than imagined", "Paid in gold"], c: "Heavier than imagined" }
                    ]
                },
                2: {
                    title: "Anatomy of a Man-of-War",
                    text: `<p>During the Golden Age, ships were floating fortresses. The <b>hull</b> was the main body. Below the water was the <b>keel</b> for stability. On deck, <b>masts</b> held the <b>rigging</b>. The <b>mainmast</b> was tallest. The <b>bowsprit</b> helped steer. Cannons were on the <b>gun deck</b> behind <b>gun ports</b>. The captain used the <b>quarterdeck</b>, and the <b>rudder</b> controlled direction.</p>`,
                    questions: [
                        { q: "Main body name?", a: ["Hull", "Keel", "Stern"], c: "Hull" },
                        { q: "Stability part?", a: ["Mast", "Keel", "Sail"], c: "Keel" },
                        { q: "Tallest mast?", a: ["Mainmast", "Foremast", "Bowsprit"], c: "Mainmast" },
                        { q: "Cannon windows?", a: ["Gun ports", "Hatches", "Doors"], c: "Gun ports" },
                        { q: "Captain's spot?", a: ["Hull", "Quarterdeck", "Bow"], c: "Quarterdeck" },
                        { q: "Direction control?", a: ["Rudder", "Masts", "Anchor"], c: "Rudder" },
                        { q: "Front pole?", a: ["Bowsprit", "Stern", "Keel"], c: "Bowsprit" },
                        { q: "System of ropes?", a: ["Rigging", "Hull", "Deck"], c: "Rigging" },
                        { q: "Rear of ship?", a: ["Bow", "Stern", "Masts"], c: "Stern" },
                        { q: "Cannon deck?", a: ["Sun deck", "Gun deck", "Lower deck"], c: "Gun deck" },
                        { q: "Golden Age of...", a: ["Discovery", "Piracy", "Steam"], c: "Piracy" },
                        { q: "Stability in...", a: ["Storms", "Sun", "Harbors"], c: "Storms" },
                        { q: "Masts reached...", a: ["The sky", "The sand", "The hull"], c: "The sky" },
                        { q: "Officers' cabins?", a: ["Near bow", "Near stern", "In masts"], c: "Near stern" },
                        { q: "Keel was a heavy...", a: ["Rope", "Beam", "Stone"], c: "Beam" }
                    ]
                }
            }
        };

       window.onload = function() {
    const title = document.getElementById('unit-display-title');
    const list = document.getElementById('button-list');
    
    // Set Title text
    const unitName = (selectedUnit == 1) ? "Technology" : "Pirates";
    title.innerText = "Unit " + selectedUnit + ": " + unitName;
    
    const currentUnitData = allData[selectedUnit];
    
    for (let i in currentUnitData) {
        const btn = document.createElement('button');
        
        // FIX: Remove manual .style.background and use ONLY classes
        // This ensures Unit 2 is always Red (#e74c3c)
        btn.className = "reading-btn " + (selectedUnit == 2 ? "u2-btn" : "u1-btn");
        
        btn.innerText = "Exercise " + i;
        btn.onclick = () => {
            activeData = currentUnitData[i];
            document.getElementById('start-interface').style.display = 'none';
            document.getElementById('content-container').style.display = 'block';
            document.querySelector('.text-title').innerText = activeData.title;
            document.getElementById('reading-text').innerHTML = activeData.text;
        };
        list.appendChild(btn);
    }
        };

        function startQuiz() {
            document.getElementById('reading-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const qData = activeData.questions[currentQ];
            const shuffled = [...qData.a].sort(() => Math.random() - 0.5);
            document.getElementById('q-num').innerText = currentQ + 1;
            document.querySelector('.progress').innerText = `Question ${currentQ + 1} of ${activeData.questions.length}`;
            document.getElementById('quiz-content').innerHTML = `
                <p style="font-weight:bold;">${qData.q}</p>
                ${shuffled.map(opt => `<button class="opt-btn" onclick="checkAnswer(this, '${qData.c}')">${opt}</button>`).join('')}
            `;
        }

        function checkAnswer(btn, correct) {
            const buttons = document.querySelectorAll('.opt-btn');
            buttons.forEach(b => b.disabled = true);
            if (btn.innerText === correct) { btn.classList.add('correct'); score++; } 
            else { btn.classList.add('wrong'); buttons.forEach(b => {if(b.innerText === correct) b.classList.add('correct')}) }
            
            setTimeout(() => {
                currentQ++;
                if (currentQ < activeData.questions.length) showQuestion();
                else showResults();
            }, 1000);
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `Score: ${score} / ${activeData.questions.length}`;
            
            let curr = JSON.parse(localStorage.getItem('L_CURR'));
            let users = JSON.parse(localStorage.getItem('L_DB')) || [];
            if (curr) {
                users = users.map(u => {
                    if (u.username === curr.username) { u.score = (u.score || 0) + score; curr.score = u.score; }
                    return u;
                });
                localStorage.setItem('L_DB', JSON.stringify(users));
                localStorage.setItem('L_CURR', JSON.stringify(curr));
            }
        }
    </script>
</body>
</html>
