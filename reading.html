<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnly | Reading Exercises</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }
        h1 { color: #2c3e50; font-size: 2.5rem; margin-bottom: 30px; }
        h2 { color: #7f8c8d; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        #start-interface { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #button-list { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }

        /* BASE BUTTON STYLE */
        .reading-btn {
            color: white; border: none; padding: 18px 45px;
            font-size: 1.3rem; font-weight: bold; border-radius: 12px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px;
        }

        /* UNIT 1 BLUE STYLE */
        .u1-btn { background: #3498db !important; }
        .u1-btn:hover { background: #2980b9 !important; transform: translateY(-3px); }

        /* UNIT 2 RED STYLE (MATCHING EXERCISES) */
        .u2-btn { background: #e74c3c !important; }
        .u2-btn:hover { background: #c0392b !important; transform: translateY(-3px); }

        #content-container { display: none; background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 800px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #reading-text { font-size: 1.1rem; color: #444; text-align: justify; line-height: 1.8; margin-bottom: 30px; }
        .text-title { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }

        .opt-btn { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .opt-btn.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        .question-btn { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; }
        .back-link { margin-top: 50px; display: inline-block; color: #3498db; text-decoration: none; font-weight: bold; }
        .progress { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 15px; font-weight: bold; }
    </style>
    <style>
        /* 1. Global Scaling */
        body {
            padding: 20px 10px; /* Smaller padding for mobile edges */
        }
    
        /* 2. Responsive Containers */
        #quiz-container, #content-container, .ranking-container {
            width: 95%; /* Take up almost full width on small screens */
            max-width: 600px; /* But stay slim on desktop */
            padding: 20px; /* Reduce padding inside the box */
            box-sizing: border-box;
        }
    
        /* 3. Button Column Scaling */
        .exercise-btn, .reading-btn, .unit-btn {
            width: 100%; /* Full width on mobile */
            max-width: 320px; /* Max size on desktop */
            padding: 15px 20px;
            font-size: 1.1rem; /* Slightly smaller text for mobile */
        }
    
        /* 4. Table Scroll (Leaderboard) */
        .ranking-container {
            overflow-x: auto; /* Allow horizontal swipe if the table is too wide */
        }
        
        table {
            font-size: 0.9rem; /* Smaller font for mobile tables */
        }
    
        /* 5. Navigation Bar */
        nav {
            flex-direction: column; /* Stack logo and login on very small screens */
            gap: 10px;
            text-align: center;
            padding: 1rem;
        }
    
        /* 6. Media Query (Specific for small phones) */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .hero { padding: 40px 5%; }
            .practice-btn { font-size: 1.2rem; padding: 20px; }
            .opt-btn { padding: 12px; font-size: 1rem; }
        }
    </style>
    
</head>
<body>

    <h1 id="main-title">Reading</h1>

    <div id="start-interface">
        <h2 id="unit-display-title">Loading...</h2>
        <div id="button-list"></div>
    </div>

    <div id="content-container">
        <div id="reading-section">
            <h2 class="text-title"></h2>
            <div id="reading-text"></div>
            <button class="question-btn" onclick="startQuiz()">Go to Questions</button>
        </div>

        <div id="quiz-section" style="display:none;">
            <div class="progress">Question <span id="q-num">1</span> of 10</div>
            <div id="quiz-content"></div>
            <div id="result-screen" style="display:none; text-align:center;">
                <h2>Quiz Finished!</h2>
                <p id="final-score" style="font-size:1.5rem; color: #2ecc71; font-weight: bold;"></p>
                <button class="opt-btn" style="text-align:center; background:#3498db; color:white;" onclick="location.reload()">Restart Exercise</button>
            </div>
        </div>
    </div>

    <a href="reading-hub.html" class="back-link">← Back to Units</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const selectedUnit = urlParams.get('unit') || 1;
        let currentQ = 0; let score = 0; let activeData = null;

        const allData = {
    1: {
        1: {
            title: "The Future of Artificial Intelligence",
            text: `<p>Artificial Intelligence, or AI, is changing the world faster than almost any other technology in history. At its simplest level, AI is a type of computer science that allows machines to learn from experience and perform human-like tasks. You might see AI every day when you use a smartphone to unlock your face, or when a streaming service suggests a new movie you might enjoy based on your past choices.</p>
                   <p>The development of AI depends on two main things: massive amounts of data and very powerful computers. By looking at millions of examples, an AI "learns" patterns. This is called machine learning. For example, if you show a computer thousands of photos of cats, it eventually learns to recognize a cat on its own. This technology is now being used in medicine to help doctors find diseases more accurately and in cars that can drive autonomously without a human steering. These innovations are not just theoretical; they are saving lives today by reducing human error in high-stakes environments.</p>
                   <p>However, the rise of AI also brings big challenges and ethical questions. Many people worry that robots and smart software might take over jobs in factories or offices, leading to unemployment. There is also the problem of "deepfakes," which are realistic but fake images and videos created by AI. This makes it difficult to know what is real on the internet. Experts say we must create international rules to ensure AI is used for good and remains transparent.</p>
                   <p>In the future, AI will likely become a personal assistant for everyone, helping us learn languages faster or solving complex problems like climate change. The goal is not to replace humans, but to augment our intelligence. As we move forward, it is important for students to understand how these systems work so they can use them responsibly and creatively in their future careers. The era of AI is just beginning, and we are the architects of its destiny.</p>`, // ~290 words
            questions: [
                { q: "What does AI stand for?", a: ["Artificial Intelligence", "Auto Info", "Alpha Intel"], c: "Artificial Intelligence" },
                { q: "AI allows machines to learn from...", a: ["Experience", "Food", "Batteries"], c: "Experience" },
                { q: "What is 'Machine Learning'?", a: ["Building engines", "Learning patterns from data", "Typing fast"], c: "Learning patterns from data" },
                { q: "How can AI help doctors?", a: ["Detecting diseases", "Cleaning", "Driving"], c: "Detecting diseases" },
                { q: "What is an autonomous car?", a: ["A fast car", "A self-driving car", "An electric car"], c: "A self-driving car" },
                { q: "What is a major worry about AI?", a: ["Unemployment", "Too much sleep", "Better internet"], c: "Unemployment" },
                { q: "What are 'deepfakes'?", a: ["Deep oceans", "Realistic fake media", "Fast robots"], c: "Realistic fake media" },
                { q: "AI development needs data and...", a: ["Water", "Powerful computers", "Paper"], c: "Powerful computers" },
                { q: "The goal is to _____ human intelligence.", a: ["Replace", "Augment", "Stop"], c: "Augment" },
                { q: "Experts say we need _____ for AI.", a: ["More games", "International rules", "No electricity"], c: "International rules" },
                { q: "Streaming services use AI for...", a: ["Suggestions", "Recording", "Buying"], c: "Suggestions" },
                { q: "To recognize cats, AI needs...", a: ["Photos", "Milk", "Toys"], c: "Photos" },
                { q: "Face unlock is an example of...", a: ["Daily AI", "Magic", "A virus"], c: "Daily AI" },
                { q: "Machine learning looks for...", a: ["Errors", "Patterns", "Colors"], c: "Patterns" },
                { q: "AI can solve problems like...", a: ["Climate change", "Cooking", "Walking"], c: "Climate change" },
                { q: "Students should use AI...", a: ["Responsibly", "To cheat", "Never"], c: "Responsibly" },
                { q: "The era of AI is...", a: ["Ending", "Just beginning", "Old"], c: "Just beginning" },
                { q: "AI reduces human _____.", a: ["Happiness", "Error", "Speed"], c: "Error" },
                { q: "Deepfakes make it hard to...", a: ["Sleep", "Know what is real", "Play games"], c: "Know what is real" },
                { q: "AI mimics _____ tasks.", a: ["Animal", "Human-like", "Robot-only"], c: "Human-like" }
            ]
        },
        2: {
            title: "Nvidia: The Graphics Giant",
            text: `<p>Nvidia Corporation has evolved from a small graphics card maker into the most influential force in modern technology. Founded in 1993, the company initially focused on specialized hardware for video games. They invented the Graphics Processing Unit (GPU), which allowed computers to render beautiful, complex images much faster than before. For years, gamers were the only ones who cared about Nvidia, but that changed when scientists realized these chips were good for more than just play.</p>
                   <p>Unlike a traditional computer processor (CPU) that handles one task at a time, a GPU can process thousands of small tasks simultaneously. This is called parallel computing. In the mid-2000s, Nvidia released a software platform called CUDA, which let developers use GPUs for scientific research. This was a turning point. Suddenly, GPUs were being used to simulate weather patterns, analyze medical data, and eventually, build the massive neural networks that power today's Artificial Intelligence.</p>
                   <p>As the demand for AI exploded, so did Nvidia's value. Their chips, like the H100, are now the "gold" of the tech world. Every major company, from Google to Microsoft, relies on Nvidia's architecture to run their data centers. While competitors are trying to build their own chips, Nvidia's head start in both hardware and software makes them difficult to beat. Today, the company stands as the primary engine driving the era of machine learning and digital transformation, proving that a gaming company could truly change the entire world forever.</p>`, // ~260 words
            questions: [
                { q: "When was Nvidia founded?", a: ["1990", "1993", "2000"], c: "1993" },
                { q: "What did Nvidia invent?", a: ["The CPU", "The GPU", "The Internet"], c: "The GPU" },
                { q: "What was their original focus?", a: ["Video games", "Medicine", "Weather"], c: "Video games" },
                { q: "What is parallel computing?", a: ["One task at a time", "Thousands of tasks at once", "Manual math"], c: "Thousands of tasks at once" },
                { q: "What is the name of their software platform?", a: ["CUDA", "Python", "Windows"], c: "CUDA" },
                { q: "Why did scientists like GPUs?", a: ["For gaming", "For research power", "They are cheap"], c: "For research power" },
                { q: "Nvidia's chips are called the _____ of tech.", a: ["Silver", "Gold", "Iron"], c: "Gold" },
                { q: "Which chip model is mentioned?", a: ["H100", "A1", "X500"], c: "H100" },
                { q: "Nvidia is the _____ of the AI revolution.", a: ["Brake", "Engine", "Fuel"], c: "Engine" },
                { q: "Where is Nvidia's HQ implied to influence?", a: ["Data centers", "Local shops", "Schools"], c: "Data centers" },
                { q: "GPUs handle thousands of _____ tasks.", a: ["Large", "Small", "Secret"], c: "Small" },
                { q: "CUDA allows GPUs to be used for _____ computing.", a: ["General-purpose", "Gaming-only", "Slow"], c: "General-purpose" },
                { q: "Who are their current main customers?", a: ["Only gamers", "Major tech companies", "Artists"], c: "Major tech companies" },
                { q: "Nvidia helps build _____ networks.", a: ["Radio", "Neural", "Social"], c: "Neural" },
                { q: "Nvidia's value has _____.", a: ["Dropped", "Skyrocketed", "Stayed same"], c: "Skyrocketed" }
            ]
        }
    },
    2: {
        1: {
            title: "The Legend of the Golden Compass",
            text: `<p>The salty wind of the Atlantic Ocean whipped through Captain Julian’s beard as he stood firmly on the deck of the <i>Sea Serpent</i>. For nearly two decades, Julian had dedicated his life to a single obsession: finding the Golden Compass. Legend said this magical artifact didn't point North, but rather toward the greatest desire of the person holding it. To some, that was a mountain of gold; to Julian, it was the hidden island where his father had vanished years ago during a terrible storm.</p>
                   <p>His crew was a mixture of brave sailors and dangerous outcasts. Among them was Silas, a giant of a man with a scarred face who served as the boatswain, and young Leo, a cabin boy who had never seen the world beyond the harbor of London until now. They had been sailing through a thick, unnatural fog for three days. The air was cold, and the wood of the ship groaned under the pressure of the waves. "Steady as she goes!" Julian roared, his voice cutting through the mist like a blade. He knew they were close; the water had turned a strange shade of purple, a sign mentioned in the ancient journals of the pirate lords.</p>
                   <p>Suddenly, the fog lifted, revealing a jagged coastline that looked like the teeth of a giant. This was the Isle of Skulls. "Lower the anchors!" Silas commanded, his voice echoing across the water. The crew worked with lightning speed, for they knew that these waters were home to creatures that had sunk many ships before them. Julian looked at the shore through his brass telescope. There, sitting atop a white stone pedestal near the beach, was a glimmering object. It was the compass. However, as the first boat touched the sand, a deep, rumbling sound began to shake the very ground. The island wasn't just land; it was waking up. Julian realized that the treasure was a trap, and the true adventure was just beginning as the sand began to swirl into a massive whirlpool around the <i>Sea Serpent</i>.</p>`, // ~365 words
            questions: [
                { q: "What is the ship's name?", a: ["Sea Serpent", "Black Raven", "Ocean King"], c: "Sea Serpent" },
                { q: "Where does the Golden Compass point?", a: ["North", "Your greatest desire", "The nearest gold"], c: "Your greatest desire" },
                { q: "How long has Julian searched?", a: ["10 years", "Almost 20 years", "5 years"], c: "Almost 20 years" },
                { q: "Who is Silas?", a: ["The captain", "The boatswain", "The cabin boy"], c: "The boatswain" },
                { q: "What color was the water?", a: ["Blue", "Purple", "Green"], c: "Purple" },
                { q: "Where did Leo come from?", a: ["London", "Paris", "Spain"], c: "London" },
                { q: "What was the island called?", a: ["Echo Isle", "Isle of Skulls", "Gold Land"], c: "Isle of Skulls" },
                { q: "How long was the fog?", a: ["One day", "Three days", "A week"], c: "Three days" },
                { q: "Julian looked through a...", a: ["Mirror", "Brass telescope", "Window"], c: "Brass telescope" },
                { q: "The compass sat on a...", a: ["Tree", "White stone pedestal", "Table"], c: "White stone pedestal" },
                { q: "What did the island do?", a: ["Sank", "Started waking up", "Caught fire"], c: "Started waking up" },
                { q: "Silas has a _____ face.", a: ["Kind", "Scarred", "Funny"], c: "Scarred" },
                { q: "What cut through the mist?", a: ["Julian's voice", "A light", "A cannon"], c: "Julian's voice" },
                { q: "The wood of the ship...", a: ["Burned", "Groaned", "Broke"], c: "Groaned" },
                { q: "Leo had never seen...", a: ["The world", "A ship", "Gold"], c: "The world" },
                { q: "The coastline looked like...", a: ["Clouds", "Giant's teeth", "Walls"], c: "Giant's teeth" },
                { q: "Silas commanded to...", a: ["Fire cannons", "Lower anchors", "Sing"], c: "Lower anchors" },
                { q: "The sand turned into a...", a: ["Whirlpool", "Mountain", "Road"], c: "Whirlpool" },
                { q: "Julian's father vanished in a...", a: ["War", "Storm", "Forest"], c: "Storm" },
                { q: "The treasure was a...", a: ["Gift", "Trap", "Map"], c: "Trap" }
            ]
        },
        2: {
            title: "Anatomy of a Pirate Ship",
            text: `<p>To survive the dangerous life at sea, a pirate had to know every inch of his vessel. The most vital part was the <b>hull</b>, the heavy outer shell of the ship that kept the water out. Inside the hull was the <b>hold</b>, where food, fresh water, and stolen treasure were stored. For stability, the <b>keel</b> ran along the very bottom of the ship, acting like a backbone to prevent the boat from tipping over during a heavy gale.</p>
                   <p>Above the water, the <b>deck</b> was the main area of activity. The <b>quarterdeck</b> was a raised section at the back where the captain and officers stood to navigate. This area gave them a clear view of the entire ship. Near the front was the <b>forecastle</b>, which often housed the crew's sleeping quarters. The <b>masts</b> were tall wooden poles that held the massive sails; the <b>mainmast</b> was the center of power, while the <b>foremast</b> helped with steering. Finally, the <b>rudder</b> at the back, connected to the ship's wheel, was the only way to guide the ship through narrow coral reefs. If the rudder broke, the ship was at the mercy of the wind.</p>`, // ~215 words
            questions: [
                { q: "What keeps water out?", a: ["The hull", "The sail", "The flag"], c: "The hull" },
                { q: "Where is treasure stored?", a: ["The hold", "The mast", "The wheel"], c: "The hold" },
                { q: "What is the ship's 'backbone'?", a: ["The keel", "The deck", "The anchor"], c: "The keel" },
                { q: "Where do officers stand?", a: ["The quarterdeck", "The kitchen", "The hull"], c: "The quarterdeck" },
                { q: "What is the tallest pole called?", a: ["Foremast", "Mainmast", "Flagpole"], c: "Mainmast" },
                { q: "What guides the ship?", a: ["The rudder", "The keel", "The floor"], c: "The rudder" },
                { q: "Where did the crew sleep?", a: ["The forecastle", "The hold", "The masts"], c: "The forecastle" },
                { q: "The rudder is connected to the...", a: ["Wheel", "Anchor", "Bell"], c: "Wheel" },
                { q: "A 'gale' is a type of...", a: ["Storm/Wind", "Fish", "Food"], c: "Storm/Wind" },
                { q: "Masts are made of...", a: ["Iron", "Wood", "Gold"], c: "Wood" },
                { q: "The hull is the outer _____.", a: ["Shell", "Window", "Door"], c: "Shell" },
                { q: "Which part helps steering?", a: ["Foremast", "Treasure", "The hold"], c: "Foremast" },
                { q: "A broken rudder means...", a: ["No food", "No control", "Fast speed"], c: "No control" },
                { q: "Narrow areas in water are...", a: ["Reefs", "Clouds", "Cities"], c: "Reefs" },
                { q: "The quarterdeck is at the...", a: ["Front", "Back/Rear", "Middle"], c: "Back/Rear" }
            ]
        }
    }
};

       window.onload = function() {
    const title = document.getElementById('unit-display-title');
    const list = document.getElementById('button-list');
    
    // Set Title text
    const unitName = (selectedUnit == 1) ? "Technology" : "Pirates";
    title.innerText = "Unit " + selectedUnit + ": " + unitName;
    
    const currentUnitData = allData[selectedUnit];
    
    for (let i in currentUnitData) {
        const btn = document.createElement('button');
        
        // FIX: Remove manual .style.background and use ONLY classes
        // This ensures Unit 2 is always Red (#e74c3c)
        btn.className = "reading-btn " + (selectedUnit == 2 ? "u2-btn" : "u1-btn");
        
        btn.innerText = "Exercise " + i;
        btn.onclick = () => {
            activeData = currentUnitData[i];
            document.getElementById('start-interface').style.display = 'none';
            document.getElementById('content-container').style.display = 'block';
            document.querySelector('.text-title').innerText = activeData.title;
            document.getElementById('reading-text').innerHTML = activeData.text;
        };
        list.appendChild(btn);
    }
        };

        function startQuiz() {
            document.getElementById('reading-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const qData = activeData.questions[currentQ];
            const shuffled = [...qData.a].sort(() => Math.random() - 0.5);
            document.querySelector('.progress').innerText = `Question ${currentQ + 1} of ${activeData.questions.length}`;
            document.getElementById('quiz-content').innerHTML = `
                <p style="font-weight:bold;">${qData.q}</p>
               ${shuffled.map(opt => `<button class="opt-btn" onclick="checkAnswer(this, '${qData.c}')">${opt}</button>`).join('')}
            `;
         
            }
        

        function checkAnswer(btn, correct) {
            const buttons = document.querySelectorAll('.opt-btn');
            buttons.forEach(b => b.disabled = true);
            if (btn.innerText === correct) { btn.classList.add('correct'); score++; } 
            else { btn.classList.add('wrong'); buttons.forEach(b => {if(b.innerText === correct) b.classList.add('correct')}) }
            
            setTimeout(() => {
                currentQ++;
                if (currentQ < activeData.questions.length) showQuestion();
                else showResults();
            }, 1000);
        }

        function showResults() {
            console.log("Final Score:", score);
    // 1. Calculate points (Example: 10 per correct answer)
    const earnedPoints = score * 10; 
    
    // 2. Get the database
    let curr = JSON.parse(localStorage.getItem('L_CURR'));
    let users = JSON.parse(localStorage.getItem('L_DB')) || [];

    if (curr) {
        // 3. Update the user in the list
        users = users.map(u => {
            if (u.username === curr.username) {
                // Use parseInt to avoid math errors
                u.score = (parseInt(u.score) || 0) + earnedPoints;
                curr.score = u.score;
            }
            return u;
        });

        // 4. SAVE BOTH (The most important step!)
        localStorage.setItem('L_DB', JSON.stringify(users));
        localStorage.setItem('L_CURR', JSON.stringify(curr));
    }
    // UI Update
    document.getElementById('final-score').innerText = `You earned ${earnedPoints} points!`;
    document.getElementById('quiz-content').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
   
}
    </script>
</body>
</html>
