            align-items: center;
            padding: 50px 20px;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        h2 {
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* This creates the vertical column */
        #button-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
        }

        .exercise-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            /* Fixed width for consistent look */
        }

        .exercise-btn:hover {
            transform: translateY(-3px);
            background: #2980b9;
        }

        .u2-style {
            background: #e74c3c;
        }

        .u2-style:hover {
            background: #c0392b;
        }

        #quiz-container {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .question {
            display: none;
        }

        .question.active {
            display: block;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-btn {
            background: #fff;
            color: #333;
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            font-size: 1.1rem;
            width: 100%;
        }

        .opt-btn.correct {
            background: #2ecc71 !important;
            color: white;
            border-color: #27ae60;
        }

        .opt-btn.wrong {
            background: #e74c3c !important;
            color: white;
            border-color: #c0392b;
        }

        .result-screen {
            display: none;
            text-align: center;
        }

        .back-link {
            margin-top: 50px;
            display: inline-block;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .progress {

            color: #7f8c8d;

        const urlParams = new URLSearchParams(window.location.search);

        let currentQuestion = 0;
        let score = 0;

        // 1. RE-SYNC SESSION FROM DATABASE
        function syncSession() {
            let curr = JSON.parse(localStorage.getItem('L_CURR'));
            let users = JSON.parse(localStorage.getItem('L_DB')) || [];

            // If session is lost but we have a database, try to find the last active user
            if (!curr && users.length > 0) {
                // We take the first user just to keep the points saving
                // Or better: redirect them to login
                alert("Session lost! Redirecting to login...");
                window.location.href = 'index.html';
            }
        }

        // Run this immediately when the page loads
        syncSession();


        window.onload = function () {
            const title = document.getElementById('unit-display-title');
            const list = document.getElementById('button-list');
            const unitName = selectedUnit == 1 ? "Space" : "Nintendo";
            title.innerText = "Unit " + selectedUnit + ": " + unitName;

            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = "exercise-btn" + (selectedUnit == 2 ? " u2-style" : "");
                btn.innerText = "Exercise " + i;
                btn.onclick = () => startQuiz(selectedUnit, i);
                list.appendChild(btn);
            }
        };

        function startQuiz(unit, exercise) {
            const data = unitData[unit][exercise];
            activeQuiz = data.questions;
            currentQuestion = 0;
            score = 0;
            document.getElementById('start-interface').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            initQuiz();
        }

        function initQuiz() {
            const wrapper = document.getElementById('questions-wrapper');
            wrapper.innerHTML = '';
            activeQuiz.forEach((data, idx) => {
                const shuffled = [...data.options].sort(() => Math.random() - 0.5);
                const div = document.createElement('div');
                div.className = `question ${idx === 0 ? 'active' : ''}`;
                div.innerHTML = `<p class="question-text">${data.q}</p><div class="options">
                    ${shuffled.map(opt => `<button class="opt-btn" onclick="handleChoice(this, '${data.correct}')">${opt}</button>`).join('')}
                </div>`;
                wrapper.appendChild(div);
            });
        }

        function handleChoice(btn, correct) {
            const buttons = btn.parentElement.querySelectorAll('.opt-btn');
            buttons.forEach(b => b.disabled = true);
            if (btn.innerText === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                buttons.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
            }
            setTimeout(() => {
                if (currentQuestion < activeQuiz.length - 1) {
                    document.querySelectorAll('.question')[currentQuestion].classList.remove('active');
                    currentQuestion++;
                    document.querySelectorAll('.question')[currentQuestion].classList.add('active');
                    document.getElementById('current-idx').innerText = currentQuestion + 1;
                } else {
                    showResults();
                }
            }, 1000);
        }

        async function saveToGoogleSheets(name, points) {
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ username: name, score: points })
            });
        }


        function showResults() {
            const earnedPoints = score * 10;
            let users = JSON.parse(localStorage.getItem('L_DB')) || [];
            let curr = JSON.parse(localStorage.getItem('L_CURR'));

            // If curr is missing, we try to find the user in the DB by a fallback 
            // (This is a safety net for Firefox local file issues)
            if (!curr) {
                alert("Error: Please log in again on the Home page before finishing.");
                window.location.href = 'index.html';
                return;
            }

            // Update the database
            users = users.map(u => {
                if (u.username === curr.username) {
                    u.score = (parseInt(u.score) || 0) + earnedPoints;
                    curr.score = u.score;
                }
                return u;
            });

            localStorage.setItem('L_DB', JSON.stringify(users));
            localStorage.setItem('L_CURR', JSON.stringify(curr));

            document.getElementById('quiz-box').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-text').innerText = `Points: ${earnedPoints}`;

            saveToGoogleSheets(curr.username, earnedPoints);
        }
